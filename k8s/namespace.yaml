# Namespace is bootstrap infra (created once, before any application install)
# and lives outside the Helm chart. Applying via kubectl is consistent with the
# assignment rule that bans `kubectl apply` for application *workloads* — a
# Namespace isn't a workload.
#
# Pod Security Admission labels enforce the `restricted` profile cluster-side
# even if a future chart bug regresses pod-level securityContext.
apiVersion: v1
kind: Namespace
metadata:
  name: payment-api
  labels:
    app.kubernetes.io/managed-by: bootstrap
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
